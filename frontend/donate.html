<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate Nearby — MedExpiry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans:['Inter','sans-serif'], display:['Space Grotesk','sans-serif'] }, colors: { brand:{50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d'}, danger:{50:'#fef2f2',100:'#fee2e2',400:'#f87171',500:'#ef4444',600:'#dc2626'}, warning:{50:'#fffbeb',100:'#fef3c7',400:'#fbbf24',500:'#f59e0b',600:'#d97706'}, dark:{800:'#1e1e2e',900:'#11111b',950:'#0a0a14'} } } } }
    </script>
</head>
<body class="bg-dark-950 text-white min-h-screen font-sans">

    <!-- NAV -->
    <nav class="fixed top-0 w-full z-50 bg-dark-950/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-gradient-to-br from-brand-400 to-brand-600 rounded-xl flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    </div>
                    <span class="text-xl font-display font-bold">Med<span class="text-brand-400">Expiry</span></span>
                </a>
                <div class="hidden md:flex items-center gap-1">
                    <a href="index.html" class="nav-link">Dashboard</a>
                    <a href="scan.html" class="nav-link">Scan</a>
                    <a href="track.html" class="nav-link">Track</a>
                    <a href="donate.html" class="nav-link active">Donate</a>
                    <a href="family.html" class="nav-link">Family</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- DONATE PAGE -->
    <section class="pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
        <div class="mb-8">
            <h1 class="text-3xl font-display font-bold mb-2">Donate Nearby</h1>
            <p class="text-gray-400">Find NGOs and collection centers near you. Give your unused valid medicines a second life.</p>
        </div>

        <div class="grid lg:grid-cols-5 gap-6">

            <!-- Map Section -->
            <div class="lg:col-span-3">
                <div id="map" class="w-full h-[500px] rounded-3xl border border-white/10 bg-dark-800/50 overflow-hidden relative">
                    <!-- Map loads here via Google Maps or Leaflet -->
                    <div id="mapLoading" class="absolute inset-0 flex items-center justify-center bg-dark-800">
                        <div class="text-center">
                            <div class="w-12 h-12 border-2 border-brand-400 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                            <p class="text-gray-400">Loading map...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- NGO List -->
            <div class="lg:col-span-2">
                <div class="bg-dark-800/30 rounded-3xl border border-white/5 overflow-hidden">
                    <div class="px-5 py-4 border-b border-white/5">
                        <h2 class="font-display font-bold flex items-center gap-2">
                            <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            Drop-off Locations
                        </h2>
                    </div>
                    <div id="ngoList" class="divide-y divide-white/5 max-h-[440px] overflow-y-auto scrollbar-hide">
                        <div class="p-4 animate-pulse"><div class="h-20 bg-dark-800 rounded-xl"></div></div>
                        <div class="p-4 animate-pulse"><div class="h-20 bg-dark-800 rounded-xl"></div></div>
                        <div class="p-4 animate-pulse"><div class="h-20 bg-dark-800 rounded-xl"></div></div>
                    </div>
                </div>

                <!-- Eligible Medicines -->
                <div class="mt-4 bg-dark-800/30 rounded-3xl border border-white/5 p-5">
                    <h3 class="font-display font-bold text-sm mb-3 flex items-center gap-2">
                        <svg class="w-4 h-4 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        Eligible for Donation
                    </h3>
                    <div id="donatableMeds" class="space-y-2 text-sm">
                        <p class="text-gray-500">Loading...</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Leaflet CSS/JS (free, no API key needed) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/donate.js"></script>
</body>
</html>
