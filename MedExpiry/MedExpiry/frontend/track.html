<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Inventory — MedExpiry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans:['Inter','sans-serif'], display:['Space Grotesk','sans-serif'] }, colors: { brand:{50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d'}, danger:{50:'#fef2f2',100:'#fee2e2',400:'#f87171',500:'#ef4444',600:'#dc2626'}, warning:{50:'#fffbeb',100:'#fef3c7',400:'#fbbf24',500:'#f59e0b',600:'#d97706'}, dark:{800:'#1e1e2e',900:'#11111b',950:'#0a0a14'} } } } }
    </script>
</head>
<body class="bg-dark-950 text-white min-h-screen font-sans">

    <!-- NAV -->
    <nav class="fixed top-0 w-full z-50 bg-dark-950/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-gradient-to-br from-brand-400 to-brand-600 rounded-xl flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    </div>
                    <span class="text-xl font-display font-bold">Med<span class="text-brand-400">Expiry</span></span>
                </a>
                <div class="hidden md:flex items-center gap-1">
                    <a href="index.html" class="nav-link">Dashboard</a>
                    <a href="scan.html" class="nav-link">Scan</a>
                    <a href="track.html" class="nav-link active">Track</a>
                    <a href="donate.html" class="nav-link">Donate</a>
                    <a href="family.html" class="nav-link">Family</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- TRACK PAGE -->
    <section class="pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">

        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-display font-bold mb-2">Medicine Inventory</h1>
                <p class="text-gray-400">Track all your household medicines and get timely expiry alerts.</p>
            </div>
            <div class="flex gap-3">
                <select id="filterStatus" class="px-4 py-2.5 bg-dark-800 border border-white/10 rounded-xl text-sm text-gray-300 focus:outline-none focus:border-brand-500/50">
                    <option value="all">All Status</option>
                    <option value="expired">Expired</option>
                    <option value="critical">Critical (≤7 days)</option>
                    <option value="warning">Warning (≤30 days)</option>
                    <option value="soon">Soon (≤90 days)</option>
                    <option value="safe">Safe</option>
                </select>
                <select id="filterCategory" class="px-4 py-2.5 bg-dark-800 border border-white/10 rounded-xl text-sm text-gray-300 focus:outline-none focus:border-brand-500/50">
                    <option value="all">All Categories</option>
                    <option value="Pain Relief">Pain Relief</option>
                    <option value="Antibiotics">Antibiotics</option>
                    <option value="Antacids & GI">Antacids & GI</option>
                    <option value="Vitamins & Supplements">Vitamins & Supplements</option>
                    <option value="Allergy & Cold">Allergy & Cold</option>
                    <option value="Cardiac">Cardiac</option>
                    <option value="Diabetes">Diabetes</option>
                </select>
            </div>
        </div>

        <!-- Expiry Calendar Strip -->
        <div class="mb-8 bg-dark-800/30 rounded-3xl border border-white/5 p-6">
            <h2 class="text-lg font-display font-bold mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Expiry Calendar
            </h2>
            <div id="calendarStrip" class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
                <!-- Months injected by JS -->
            </div>
        </div>

        <!-- Medicine Cards Grid -->
        <div id="medicineGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Cards injected by JS -->
            <div class="animate-pulse bg-dark-800/50 rounded-2xl h-48"></div>
            <div class="animate-pulse bg-dark-800/50 rounded-2xl h-48"></div>
            <div class="animate-pulse bg-dark-800/50 rounded-2xl h-48"></div>
        </div>

        <!-- AI Predictions Section -->
        <div class="mt-12">
            <h2 class="text-xl font-display font-bold mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                AI Refill Predictions
            </h2>
            <div id="predictionsGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="animate-pulse bg-dark-800/50 rounded-2xl h-36"></div>
                <div class="animate-pulse bg-dark-800/50 rounded-2xl h-36"></div>
            </div>
        </div>
    </section>

    <script src="js/tracker.js"></script>
</body>
</html>
